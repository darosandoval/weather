<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Weather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, Helvetica, sans-serif;
      background: #f0f4f8;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 20px 16px;
    }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
    .search-row {
      display: -webkit-flex; display: flex;
      gap: 8px; margin-bottom: 20px;
    }
    input {
      -webkit-flex: 1; flex: 1;
      padding: 10px 14px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 10px;
      background: #fff; outline: none;
      -webkit-appearance: none;
    }
    button {
      padding: 10px 18px; font-size: 15px;
      background: #3b82f6; color: #fff;
      border: none; border-radius: 10px;
      -webkit-appearance: none; cursor: pointer;
    }
    .card {
      background: #fff; border-radius: 14px;
      padding: 20px; margin-bottom: 14px;
      border: 1px solid #e0e0e0;
    }
    .main-temp {
      font-size: 64px; font-weight: 300;
      line-height: 1; margin: 8px 0;
    }
    .condition {
      font-size: 18px; color: #444;
      margin-bottom: 12px;
    }
    .details-grid {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      gap: 12px; margin-top: 14px;
      border-top: 1px solid #eee; padding-top: 14px;
    }
    .detail-item { min-width: 80px; }
    .detail-label {
      font-size: 12px; color: #888;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .detail-value { font-size: 16px; font-weight: 500; }
    .forecast-row {
      display: -webkit-flex; display: flex;
      gap: 10px; overflow-x: auto;
    }
    .forecast-day {
      -webkit-flex: 1; flex: 1;
      min-width: 80px; background: #f8f9fa;
      border-radius: 10px; padding: 12px 8px;
      text-align: center; border: 1px solid #eee;
    }
    .day-name { font-size: 13px; color: #666; margin-bottom: 6px; }
    .day-icon { font-size: 24px; margin-bottom: 4px; }
    .day-high { font-size: 16px; font-weight: 500; }
    .day-low { font-size: 13px; color: #888; }
    .error { color: #c0392b; font-size: 14px; padding: 8px 0; }
    .loading { color: #888; font-size: 14px; padding: 8px 0; }
    .location-name {
      font-size: 15px; color: #555; margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <h1>Weather</h1>
  <p class="subtitle">Enter a city to get started</p>

  <div class="search-row">
    <input type="text" id="city-input" placeholder="Buenos Aires, London..."
      value="" />
    <button id="search-btn">Search</button>
  </div>

  <div id="output"></div>

  <script>
    var API_KEY = 'c94e6151ff3926d44d5404eee57650d2';
    var btn = document.getElementById('search-btn');
    var input = document.getElementById('city-input');
    var output = document.getElementById('output');

    function weatherIcon(code) {
      if (code <= 232) return '⚡';
      if (code <= 321) return '🌧';
      if (code <= 531) return '🌦';
      if (code <= 622) return '❄';
      if (code <= 781) return '🌪';
      if (code === 800) return '☀';
      if (code <= 802) return '⛅';
      return '☁';
    }

    function dayName(timestamp) {
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return days[new Date(timestamp * 1000).getDay()];
    }

    function fetchWeather(city) {
      output.innerHTML = '<p class="loading">Loading...</p>';
      var url = 'https://api.openweathermap.org/data/2.5/forecast' +
        '?q=' + encodeURIComponent(city) +
        '&units=metric&cnt=24&appid=' + API_KEY;

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status !== 200) {
          output.innerHTML = '<p class="error">City not found. Try again.</p>';
          return;
        }
        try {
          var data = JSON.parse(xhr.responseText);
          renderWeather(data);
        } catch(e) {
          output.innerHTML = '<p class="error">Error reading data.</p>';
        }
      };
      xhr.send();
    }

    function renderWeather(data) {
      var current = data.list[0];
      var temp = Math.round(current.main.temp);
      var feels = Math.round(current.main.feels_like);
      var humidity = current.main.humidity;
      var wind = Math.round(current.wind.speed * 3.6);
      var condition = current.weather[0].description;
      var icon = weatherIcon(current.weather[0].id);
      var city = data.city.name + ', ' + data.city.country;

      var dailyMap = {};
      for (var i = 0; i < data.list.length; i++) {
        var item = data.list[i];
        var d = dayName(item.dt);
        if (!dailyMap[d]) {
          dailyMap[d] = { high: -999, low: 999, icon: weatherIcon(item.weather[0].id) };
        }
        if (item.main.temp_max > dailyMap[d].high) dailyMap[d].high = item.main.temp_max;
        if (item.main.temp_min < dailyMap[d].low) dailyMap[d].low = item.main.temp_min;
      }

      var days = Object.keys(dailyMap).slice(0, 4);
      var forecastHTML = '';
      for (var j = 0; j < days.length; j++) {
        var day = days[j];
        forecastHTML += '<div class="forecast-day">' +
          '<div class="day-name">' + day + '</div>' +
          '<div class="day-icon">' + dailyMap[day].icon + '</div>' +
          '<div class="day-high">' + Math.round(dailyMap[day].high) + '°</div>' +
          '<div class="day-low">' + Math.round(dailyMap[day].low) + '°</div>' +
          '</div>';
      }

      output.innerHTML =
        '<div class="card">' +
          '<p class="location-name">' + city + '</p>' +
          '<div class="main-temp">' + icon + ' ' + temp + '°</div>' +
          '<p class="condition">' + condition + '</p>' +
          '<div class="details-grid">' +
            '<div class="detail-item"><div class="detail-label">Feels like</div><div class="detail-value">' + feels + '°</div></div>' +
            '<div class="detail-item"><div class="detail-label">Humidity</div><div class="detail-value">' + humidity + '%</div></div>' +
            '<div class="detail-item"><div class="detail-label">Wind</div><div class="detail-value">' + wind + ' km/h</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="card">' +
          '<div class="forecast-row">' + forecastHTML + '</div>' +
        '</div>';
    }

    btn.addEventListener('click', function() {
      var city = input.value.trim();
      if (city) fetchWeather(city);
    });

    input.addEventListener('keydown', function(e) {
      if (e.keyCode === 13) {
        var city = input.value.trim();
        if (city) fetchWeather(city);
      }
    });
  </script>
</body>
</html>
